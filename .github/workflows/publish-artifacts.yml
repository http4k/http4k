name: Publish Artifacts
on:
  push:
    tags:
    - '*'
permissions:
  contents: read
jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'http4k/http4k'
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      with:
        ref: ${{ github.ref_name }}
    - name: Setup Java
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
      with:
        java-version: '21'
        distribution: adopt
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
    - name: Install cosign
      uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e
    - name: Build artifacts
      run: |-
        ./gradlew jar sourcesJar dokkaJavadocJar plainJavadocJar testFixturesSourcesJar --no-configuration-cache \
        -PreleaseVersion="$RELEASE_VERSION"
      env:
        RELEASE_VERSION: ${{ github.ref_name }}
      shell: bash
    - name: Generate SBOMs
      run: |-
        ./gradlew cyclonedxDirectBom --no-configuration-cache \
        -PreleaseVersion="$RELEASE_VERSION"
      env:
        RELEASE_VERSION: ${{ github.ref_name }}
      shell: bash
    - name: Generate license reports
      run: |-
        ./gradlew generateLicenseReportJson --no-configuration-cache \
        -PreleaseVersion="$RELEASE_VERSION"
      env:
        RELEASE_VERSION: ${{ github.ref_name }}
      shell: bash
    - name: Build publish manifest
      run: |-
        ./gradlew writePublishManifest --no-configuration-cache \
        -PreleaseVersion="$RELEASE_VERSION"
      env:
        RELEASE_VERSION: ${{ github.ref_name }}
      shell: bash
    - name: Generate POMs
      run: |-
        ./gradlew generatePomFileForMavenPublication generatePomFileForPluginMavenPublication --no-configuration-cache \
        -PreleaseVersion="$RELEASE_VERSION"
      env:
        RELEASE_VERSION: ${{ github.ref_name }}
      shell: bash
    - name: Sign artifacts and generate provenance
      run: bin/sign-and-attest.sh "$RELEASE_VERSION"
      env:
        RELEASE_VERSION: ${{ github.ref_name }}
        COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      shell: bash
    - name: Publish to http4k Maven
      run: |-
        ./gradlew publishAllPublicationsToHttp4kRepository --no-configuration-cache \
        -Psign=true \
        -PincludeProvenance=true \
        -PreleaseVersion="$RELEASE_VERSION" \
        -PltsPublishingUser="$LTS_PUBLISHING_USER" \
        -PltsPublishingPassword="$LTS_PUBLISHING_PASSWORD" \
        -PsigningKey="$SIGNING_KEY" \
        -PsigningPassword="$SIGNING_PASSWORD"
      env:
        RELEASE_VERSION: ${{ github.ref_name }}
        LTS_PUBLISHING_USER: ${{ secrets.LTS_PUBLISHING_USER }}
        LTS_PUBLISHING_PASSWORD: ${{ secrets.LTS_PUBLISHING_PASSWORD }}
        SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      shell: bash
    - name: Publish to Maven Central
      run: |-
        ./gradlew publishAllPublicationsToMavenCentralRepository --no-configuration-cache \
        -Psign=true \
        -PreleaseVersion="$RELEASE_VERSION" \
        -PsigningKey="$SIGNING_KEY" \
        -PsigningPassword="$SIGNING_PASSWORD"
      env:
        RELEASE_VERSION: ${{ github.ref_name }}
        SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      shell: bash
    - name: Notify LTS Slack
      run: bin/notify_lts_slack.sh ${{ github.ref_name }}
      env:
        LTS_SLACK_WEBHOOK: ${{ secrets.LTS_SLACK_WEBHOOK }}
      shell: bash