name: Update Dependencies
on:
  schedule:
  - cron: 0 8 * * 1
  workflow_dispatch:
jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      with:
        token: ${{ secrets.TOOLBOX_REPO_TOKEN }}
    - name: Set up JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
      with:
        java-version: '21'
        distribution: temurin
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
    - name: Build
      run: ./gradlew versionCatalogUpdate typeflowsExport
      shell: bash
    - name: Build
      if: steps.verify-changed-files.outputs.changed == 'true'
      timeout-minutes: 120
      run: bin/build_ci.sh
      env:
        HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
        HONEYCOMB_DATASET: ${{ secrets.HONEYCOMB_DATASET }}
      shell: bash
    - name: Check for changes
      id: changes
      run: |-
        if git diff --quiet; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi
      shell: bash
    - name: Create Pull Request
      if: steps.changes.outputs.has_changes
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
      with:
        token: ${{ secrets.TOOLBOX_REPO_TOKEN }}
        commit-message: 'chore: Update dependencies'
        title: 'chore: update dependencies'
        body: |-
          This PR updates dependencies in the various projects in this repo.

          Verified build passes with updated dependencies

          Please review the changes and merge if appropriate.
        branch: update-dependencies
        delete-branch: 'true'