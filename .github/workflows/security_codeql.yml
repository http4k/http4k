name: Security - Vulnerability Scanning (CodeQL)
on:
  push:
    branches:
    - master
    paths-ignore:
    - '**/*.md'
  pull_request:
    branches:
    - master
    paths-ignore:
    - '**/*.md'
  schedule:
  - cron: 0 12 * * 3
permissions:
  contents: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    name: Analyze
    if: github.repository == 'http4k/http4k'
    permissions:
      actions: read
      contents: read
      security-events: write
    timeout-minutes: 360
    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
    - name: Initialize CodeQL
      uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81
      with:
        languages: java
        build-mode: none
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81
      with:
        category: /language:java