name: Release API
on:
  repository_dispatch:
    types:
    - http4k-release
  workflow_dispatch:
    inputs:
      version:
        description: The version of the API to tag in the docs
        type: string
permissions:
  contents: read
jobs:
  release-api:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
    - name: Setup Java
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
      with:
        java-version: '21'
        distribution: adopt
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
    - name: Generate API docs
      run: ./gradlew -i dokkaGenerateHtml -PreleaseVersion="${{ github.event.client_payload.version || inputs.version }}" -Porg.gradle.parallel=true
      shell: bash
    - name: Checkout API repo
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      with:
        repository: http4k/api
        token: ${{ secrets.AUTHOR_TOKEN }}
        path: tmp
    - name: Copy docs
      run: cp -R build/docs/api/html/* tmp/
      shell: bash
    - name: Commit API docs
      uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5
      with:
        cwd: tmp
        message: release API docs
      env:
        GITHUB_TOKEN: ${{ secrets.AUTHOR_TOKEN }}
    - name: Push API docs
      uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c
      with:
        github_token: ${{ secrets.AUTHOR_TOKEN }}
        directory: tmp
        repository: http4k/api