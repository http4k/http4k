name: Test Provenance Pipeline
on:
  workflow_dispatch:
env:
  ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
  RELEASE_VERSION: '4.48.0.1'
jobs:
  test-provenance:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5.0.0
    - name: Setup Java
      uses: actions/setup-java@v5.0.0
      with:
        java-version: '21'
        distribution: adopt
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5.0.0
    - name: Install cosign
      uses: sigstore/cosign-installer@v3.8.0
    - name: Build
      run: ./gradlew :http4k-incubator:jar --no-configuration-cache -PreleaseVersion="$RELEASE_VERSION"
      shell: bash
    - name: Generate SBOM
      run: ./gradlew :http4k-incubator:cyclonedxBom --no-configuration-cache -PreleaseVersion="$RELEASE_VERSION"
      shell: bash
    - name: Build publish manifest
      run: ./gradlew :http4k-incubator:writePublishManifest --no-configuration-cache -PreleaseVersion="$RELEASE_VERSION"
      shell: bash
    - name: Sign artifacts and generate provenance
      run: bin/sign-and-attest.sh "$RELEASE_VERSION"
      env:
        COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      shell: bash
    - name: Upload provenance to S3
      run: |-
        ./gradlew :http4k-incubator:uploadProvenance --no-configuration-cache \
        -PreleaseVersion="$RELEASE_VERSION" \
        -PltsPublishingUser="$LTS_PUBLISHING_USER" \
        -PltsPublishingPassword="$LTS_PUBLISHING_PASSWORD"
      env:
        LTS_PUBLISHING_USER: ${{ secrets.LTS_PUBLISHING_USER }}
        LTS_PUBLISHING_PASSWORD: ${{ secrets.LTS_PUBLISHING_PASSWORD }}
      shell: bash
