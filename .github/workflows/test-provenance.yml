name: Test Provenance Pipeline
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: '6.39.1.0'
env:
  RELEASE_VERSION: ${{ github.event.inputs.version }}
jobs:
  test-provenance:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5.0.0
    - name: Setup Java
      uses: actions/setup-java@v5.0.0
      with:
        java-version: '21'
        distribution: adopt
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5.0.0
    - name: Install cosign
      uses: sigstore/cosign-installer@v3.8.0
    - name: Verify cosign key decryption
      run: echo "test" | cosign sign-blob --key env://COSIGN_PRIVATE_KEY --tlog-upload=false - > /dev/null
      env:
        COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      shell: bash
    - name: Build artifacts
      run: |-
        ./gradlew :http4k-incubator:jar :http4k-tools-verify:jar \
        --no-configuration-cache -PreleaseVersion="$RELEASE_VERSION"
      shell: bash
    - name: Generate SBOMs
      run: |-
        ./gradlew :http4k-incubator:cyclonedxDirectBom :http4k-tools-verify:cyclonedxDirectBom \
        --no-configuration-cache -PreleaseVersion="$RELEASE_VERSION"
      shell: bash
    - name: Generate license reports
      run: |-
        ./gradlew :http4k-incubator:generateLicenseReportJson :http4k-tools-verify:generateLicenseReportJson \
        --no-configuration-cache -PreleaseVersion="$RELEASE_VERSION"
      shell: bash
    - name: Build publish manifest
      run: |-
        ./gradlew :http4k-incubator:writePublishManifest :http4k-tools-verify:writePublishManifest \
        --no-configuration-cache -PreleaseVersion="$RELEASE_VERSION"
      shell: bash
    - name: Sign artifacts and generate provenance
      run: bin/sign-and-attest.sh "$RELEASE_VERSION"
      env:
        COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      shell: bash
    - name: Publish to S3 with provenance
      run: |-
        ./gradlew :http4k-incubator:publishAllPublicationsToHttp4kRepository \
        :http4k-tools-verify:publishAllPublicationsToHttp4kRepository \
        --no-configuration-cache \
        -Psign=true \
        -PincludeProvenance=true \
        -PreleaseVersion="$RELEASE_VERSION" \
        -PltsPublishingUser="$LTS_PUBLISHING_USER" \
        -PltsPublishingPassword="$LTS_PUBLISHING_PASSWORD" \
        -PsigningKey="$SIGNING_KEY" \
        -PsigningPassword="$SIGNING_PASSWORD"
      env:
        LTS_PUBLISHING_USER: ${{ secrets.LTS_PUBLISHING_USER }}
        LTS_PUBLISHING_PASSWORD: ${{ secrets.LTS_PUBLISHING_PASSWORD }}
        SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
      shell: bash
