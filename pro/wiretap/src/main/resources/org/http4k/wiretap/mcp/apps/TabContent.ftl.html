<div id="mcp-content" class="app-layout mcp-client-layout">
    <div class="mcp-client-list">
        <div class="mcp-client-list-header">Apps (${apps?size})</div>
        <#list apps as item>
        <div class="mcp-client-item"
             data-class-mcp-client-item-active="$selectedServerId==='${item.serverId}'"
             data-on:click="$selectedServerId='${item.serverId}'; $iframeVisible=true; loadMcpApp('${item.serverId}', '${item.resourceUri}')">
            <div class="mcp-client-item-name">${item.uiToolName}</div>
            <div class="mcp-client-item-desc">${item.serverName}</div>
        </div>
        </#list>
        <#if apps?size == 0>
        <div class="empty">No apps available</div>
        </#if>
    </div>

    <div class="mcp-client-detail" id="detail-panel">
        <div class="empty" data-show="!$iframeVisible">Select an app to launch</div>
        <iframe id="app" class="mcp-app-iframe" data-show="$iframeVisible"></iframe>
    </div>
</div>
