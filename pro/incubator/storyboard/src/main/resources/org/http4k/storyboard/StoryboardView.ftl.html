<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Storyboard: ${testTitle}</title>
<link rel="icon" type="image/png" sizes="32x32" href="https://http4k.org/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="https://http4k.org/favicon-16.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
<style>
:root {
    --color-text: #212529;
    --color-text-muted: #6c757d;
    --color-border: #dee2e6;
    --color-bg-light: #f8f9fa;
    --color-bg-hover: #e9ecef;
    --thumb-width: 133px;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    background: #fff;
    color: var(--color-text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.app-header {
    background: url("https://www.http4k.org/images/pipes-hero.svg"), linear-gradient(135deg, #59AFF5 0%, #2096F3 50%, #61C0FF 100%);
    background-size: cover;
    background-position: center;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.app-header-brand { display: flex; align-items: center; gap: 12px; }
.app-logo { height: 36px; }
.app-header-title { font-size: 18px; font-weight: 500; color: #fff; }
h1.test-title { margin: 0; padding: 12px 20px; font-size: 16px; font-weight: 500; color: var(--color-text); background: var(--color-bg-light); border-bottom: 1px solid var(--color-border); flex-shrink: 0; }
main.storyboard-view { display: flex; flex-direction: row; flex: 1; min-width: 0; min-height: 0; padding: 12px; gap: 8px; }
main.storyboard-view .notes { flex: 0 0 280px; padding: 8px 10px; background: var(--color-bg-light); border: 1px solid var(--color-border); border-radius: 4px; white-space: pre-wrap; overflow-y: auto; font-size: 13px; color: #495057; }
.frame-wrapper { position: relative; flex: 1; min-width: 0; }
.frame-wrapper iframe { width: 100%; height: 100%; display: block; border: 1px solid var(--color-border); border-radius: 4px; background: #fff; outline: none; }
.frame-overlay { position: absolute; inset: 0; background: transparent; cursor: default; }
.mode-bar { flex-shrink: 0; background: var(--color-bg-light); border-top: 1px solid var(--color-border); display: flex; justify-content: flex-end; padding: 6px 12px; }
.mode-toggle .btn-group {
    position: relative;
    background: #fff;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    padding: 2px;
    display: inline-flex;
    width: 160px;
}
.mode-toggle .btn-group::before {
    content: '';
    position: absolute;
    top: 2px;
    bottom: 2px;
    left: 2px;
    width: calc(50% - 2px);
    background: var(--color-text-muted);
    border-radius: 999px;
    transition: left 0.2s ease;
    z-index: 0;
}
.mode-toggle .btn-group:has(#mode-full:checked)::before { left: 50%; }
.mode-toggle .btn {
    position: relative;
    z-index: 1;
    flex: 1 1 0;
    font-size: 11px;
    padding: 4px 0;
    text-align: center;
    background: transparent !important;
    border: 0 !important;
    border-radius: 999px !important;
    color: var(--color-text-muted);
    transition: color 0.2s ease;
    box-shadow: none !important;
}
.mode-toggle .btn-check:checked + .btn { color: #fff; }
.storyboard-strip-wrap { position: relative; flex-shrink: 0; background: var(--color-bg-light); border-top: 1px solid var(--color-border); }
nav.storyboard-strip {
    display: flex;
    flex-direction: row;
    gap: 8px;
    padding: 10px calc(50% - (var(--thumb-width) / 2));
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
nav.storyboard-strip::-webkit-scrollbar { display: none; }
body:has(#mode-capture:checked) .thumb-tile[data-kind="Auto"] { display: none; }
.strip-selection {
    position: absolute;
    top: 6px;
    bottom: 6px;
    left: 50%;
    width: calc(var(--thumb-width) + 8px);
    transform: translateX(-50%);
    border: 2px solid #fd7e14;
    border-radius: 8px;
    box-shadow: 0 0 0 4px rgba(253,126,20,0.20);
    pointer-events: none;
    z-index: 2;
}
.thumb-tile { flex: 0 0 auto; width: var(--thumb-width); scroll-snap-align: center; padding: 6px; border: 1px solid transparent; border-radius: 6px; background: #fff; cursor: pointer; text-align: left; outline: none; }
.thumb-tile:focus { outline: none; }
.thumb-tile:focus-visible { outline: 2px solid #9ec5fe; outline-offset: 2px; }
.thumb-tile:hover { border-color: var(--color-border); }
.thumb-frame { position: relative; width: 100%; height: 78px; overflow: hidden; border: 1px solid var(--color-border); border-radius: 4px; background: #fff; }
.thumb-frame iframe { width: 1280px; height: 750px; border: 0; transform: scale(0.104); transform-origin: top left; }
.thumb-overlay { position: absolute; inset: 0; background: transparent; cursor: pointer; }
.thumb-title { display: block; margin-top: 4px; font-size: 12px; color: var(--color-text); word-break: break-word; }
footer.app-footer { text-align: center; padding: 10px 0; font-size: 0.85rem; color: var(--color-text-muted); border-top: 1px solid var(--color-border); background: var(--color-bg-light); flex-shrink: 0; }
footer.app-footer a { color: var(--color-text-muted); }
</style>
</head>
<body>
<header class="app-header">
    <div class="app-header-brand">
        <a href="https://http4k.org" target="_blank"><img class="app-logo" src="https://www.http4k.org/images/logo.png" alt="http4k"></a>
        <span class="app-header-title">Storyboard</span>
    </div>
</header>
<h1 class="test-title">${testTitle}</h1>
<main class="storyboard-view">
    <div class="frame-wrapper">
        <iframe id="storyboard-frame" sandbox=""></iframe>
        <div class="frame-overlay" aria-hidden="true"></div>
    </div>
    <div class="notes" id="storyboard-notes"></div>
</main>
<div class="mode-bar">
    <div class="mode-toggle">
        <div class="btn-group btn-group-sm" role="group" aria-label="Capture mode">
            <input type="radio" class="btn-check" name="mode" id="mode-capture" autocomplete="off" checked>
            <label class="btn" for="mode-capture">Capture</label>
            <input type="radio" class="btn-check" name="mode" id="mode-full" autocomplete="off">
            <label class="btn" for="mode-full">Full</label>
        </div>
    </div>
</div>
<div class="storyboard-strip-wrap">
    <nav class="storyboard-strip">
        <#list tiles as tile>
        <button type="button" class="thumb-tile" data-index="${tile.index}" data-kind="${tile.kind}">
            <div class="thumb-frame">
                <iframe sandbox="" class="thumb-iframe"></iframe>
                <span class="thumb-overlay"></span>
            </div>
            <span class="thumb-title">${tile.title}</span>
        </button>
        </#list>
    </nav>
    <div class="strip-selection" aria-hidden="true"></div>
</div>
<footer class="app-footer">
    Generated by http4k Storyboard · <a href="https://http4k.org" target="_blank">http4k.org</a>
</footer>
<script type="application/json" id="storyboard-data">${dataJson?no_esc}</script>
<script>
(function () {
  const frames = JSON.parse(document.getElementById('storyboard-data').textContent).frames;
  const frame = document.getElementById('storyboard-frame');
  const notes = document.getElementById('storyboard-notes');
  const strip = document.querySelector('nav.storyboard-strip');
  const tiles = Array.from(document.querySelectorAll('.thumb-tile'));
  tiles.forEach(function (t, i) { t.querySelector('iframe').srcdoc = atob(frames[i].dom); });
  let current = -1;
  const isVisible = function (i) { return tiles[i].offsetParent !== null; };
  const visible = function () { return tiles.map(function (_, i) { return i; }).filter(isVisible); };
  const apply = function (i) {
    if (i < 0 || i >= frames.length || i === current) return;
    current = i;
    tiles.forEach(function (t, idx) { t.classList.toggle('active', idx === i); });
    frame.srcdoc = atob(frames[i].dom);
    notes.textContent = frames[i].notes || '';
  };
  const show = function (i, smooth) {
    if (i < 0 || i >= frames.length) return;
    apply(i);
    tiles[i].scrollIntoView({ inline: 'center', block: 'nearest', behavior: smooth ? 'smooth' : 'auto' });
  };
  let scrollTimer;
  strip.addEventListener('scroll', function () {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(function () {
      const r = strip.getBoundingClientRect(), cx = r.left + r.width / 2;
      let best = current, bestDist = Infinity;
      visible().forEach(function (idx) {
        const br = tiles[idx].getBoundingClientRect();
        const d = Math.abs(br.left + br.width / 2 - cx);
        if (d < bestDist) { bestDist = d; best = idx; }
      });
      apply(best);
    }, 80);
  });
  tiles.forEach(function (t, idx) { t.addEventListener('click', function () { show(idx, true); }); });
  document.addEventListener('keydown', function (e) {
    const vis = visible(), pos = vis.indexOf(current);
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      if (pos >= 0 && pos + 1 < vis.length) { show(vis[pos + 1], true); e.preventDefault(); }
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      if (pos > 0) { show(vis[pos - 1], true); e.preventDefault(); }
    }
  });
  document.querySelectorAll('input[name="mode"]').forEach(function (r) {
    r.addEventListener('change', function () {
      if (current < 0 || isVisible(current)) return;
      const vis = visible();
      if (vis.length) show(vis[0], false);
    });
  });
  const first = visible()[0];
  if (first !== undefined) show(first, false);
})();
</script>
</body>
</html>
