<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Storyboards: ${title}</title>
<link rel="icon" type="image/png" sizes="32x32" href="https://http4k.org/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="https://http4k.org/favicon-16.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
<style>
:root {
    --color-text: #212529;
    --color-text-muted: #6c757d;
    --color-border: #dee2e6;
    --color-bg-light: #f8f9fa;
    --color-bg-hover: #e9ecef;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    background: #fff;
    color: var(--color-text);
    display: flex;
    flex-direction: column;
}
.app-header {
    background: url("https://www.http4k.org/images/pipes-hero.svg"), linear-gradient(135deg, #59AFF5 0%, #2096F3 50%, #61C0FF 100%);
    background-size: cover;
    background-position: center;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.app-header-brand { display: flex; align-items: center; gap: 12px; }
.app-logo { height: 36px; }
.app-header-title { font-size: 18px; font-weight: 500; color: #fff; }
h1.test-title { margin: 0; padding: 12px 20px; font-size: 16px; font-weight: 500; color: var(--color-text); background: var(--color-bg-light); border-bottom: 1px solid var(--color-border); flex-shrink: 0; }
main.index-view { flex: 1; padding: 20px; max-width: 960px; width: 100%; margin: 0 auto; }
table.index-table { width: 100%; border-collapse: collapse; }
table.index-table th, table.index-table td { padding: 10px 12px; border-bottom: 1px solid var(--color-border); text-align: left; vertical-align: middle; }
table.index-table th { font-weight: 600; color: var(--color-text-muted); background: var(--color-bg-light); text-transform: uppercase; font-size: 12px; letter-spacing: 0.04em; }
table.index-table td.count { text-align: right; color: var(--color-text-muted); width: 100px; }
table.index-table tr:hover td { background: var(--color-bg-hover); }
table.index-table a { color: #0d6efd; text-decoration: none; }
table.index-table a:hover { text-decoration: underline; }
.empty { padding: 40px; text-align: center; color: var(--color-text-muted); }
footer.app-footer { text-align: center; padding: 10px 0; font-size: 0.85rem; color: var(--color-text-muted); border-top: 1px solid var(--color-border); background: var(--color-bg-light); flex-shrink: 0; }
footer.app-footer a { color: var(--color-text-muted); }
</style>
</head>
<body>
<header class="app-header">
    <div class="app-header-brand">
        <a href="https://http4k.org" target="_blank"><img class="app-logo" src="https://www.http4k.org/images/logo.png" alt="http4k"></a>
        <span class="app-header-title">Storyboard</span>
    </div>
</header>
<h1 class="test-title">${title}</h1>
<main class="index-view">
    <#if tests?size == 0>
        <div class="empty">No storyboards recorded yet.</div>
    <#else>
        <table class="index-table">
            <thead><tr><th>Test</th><th class="count">Frames</th></tr></thead>
            <tbody>
                <#list tests as test>
                <tr>
                    <td><a href="${test.href}">${test.name}</a></td>
                    <td class="count">${test.frameCount}</td>
                </tr>
                </#list>
            </tbody>
        </table>
    </#if>
</main>
<footer class="app-footer">
    Generated by http4k Storyboard · <a href="https://http4k.org" target="_blank">http4k.org</a>
</footer>
</body>
</html>
